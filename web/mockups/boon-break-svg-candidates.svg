<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400">
  <title>Road to Riches boon and take-a-break SVG candidates</title>
  <desc>Five yellow star silhouettes for boon and five pale-yellow crescent moon silhouettes for take a break, previewed alone on dark Road to Riches board tiles.</desc>

  <defs>
    <symbol id="boon-01-classic" viewBox="0 0 100 100">
      <path fill="currentColor" d="M50 6 61.2 35.4 92.7 37 68.1 56.6 76.4 87 50 69.6 23.6 87 31.9 56.6 7.3 37 38.8 35.4Z"/>
    </symbol>

    <symbol id="boon-02-soft" viewBox="0 0 100 100">
      <path fill="currentColor" d="M50 7c2 0 3 1 4 4l8 23c1 2 2 3 5 3l23 1c4 0 5 3 2 5L73 57c-2 1-2 3-2 5l7 22c1 4-2 6-5 4L53 74c-2-1-4-1-6 0L27 88c-3 2-6 0-5-4l7-22c0-2 0-4-2-5L8 43c-3-2-2-5 2-5l23-1c3 0 4-1 5-3l8-23c1-3 2-4 4-4Z"/>
    </symbol>

    <symbol id="boon-03-wide" viewBox="0 0 100 100">
      <path fill="currentColor" d="M50 12 63 35 91 37 70 56 78 83 50 69 22 83 30 56 9 37 37 35Z"/>
    </symbol>

    <symbol id="boon-04-sharp" viewBox="0 0 100 100">
      <path fill="currentColor" d="M50 3 59 39 96 33 66 56 83 91 50 70 17 91 34 56 4 33 41 39Z"/>
    </symbol>

    <symbol id="boon-05-chunky" viewBox="0 0 100 100">
      <path fill="currentColor" d="M50 11 65 34 90 40 71 58 75 85 50 72 25 85 29 58 10 40 35 34Z"/>
    </symbol>

    <mask id="moon-01-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#000"/>
      <circle cx="50" cy="50" r="43" fill="#fff"/>
      <circle cx="67" cy="36" r="37" fill="#000"/>
    </mask>
    <mask id="moon-02-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#000"/>
      <circle cx="50" cy="50" r="43" fill="#fff"/>
      <circle cx="68" cy="34" r="40" fill="#000"/>
    </mask>
    <mask id="moon-03-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#000"/>
      <circle cx="50" cy="50" r="42" fill="#fff"/>
      <circle cx="64" cy="36" r="33" fill="#000"/>
    </mask>
    <mask id="moon-04-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#000"/>
      <circle cx="50" cy="50" r="42" fill="#fff"/>
      <circle cx="67" cy="50" r="36" fill="#000"/>
    </mask>
    <mask id="moon-05-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#000"/>
      <g transform="rotate(-11 50 50)">
        <circle cx="50" cy="50" r="42" fill="#fff"/>
        <circle cx="66" cy="36" r="36" fill="#000"/>
      </g>
    </mask>

    <symbol id="break-01-classic" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="currentColor" mask="url(#moon-01-mask)"/>
    </symbol>
    <symbol id="break-02-slim" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="currentColor" mask="url(#moon-02-mask)"/>
    </symbol>
    <symbol id="break-03-full" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="currentColor" mask="url(#moon-03-mask)"/>
    </symbol>
    <symbol id="break-04-upright" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="currentColor" mask="url(#moon-04-mask)"/>
    </symbol>
    <symbol id="break-05-tilted" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="currentColor" mask="url(#moon-05-mask)"/>
    </symbol>

    <filter id="tile-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="1400" height="1400" fill="#171b24"/>
  <text x="48" y="72" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="800" letter-spacing="1.4">BOON + TAKE A BREAK DIRECTIONS</text>
  <text x="1352" y="69" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="17" text-anchor="end">ICON ONLY • NO LABEL • NO EXTRA IMAGERY</text>

  <text x="48" y="132" fill="#ffd166" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="20" font-weight="850" letter-spacing="2">BOON • YELLOW STAR</text>
  <g color="#ffd166" font-family="Inter,ui-sans-serif,system-ui,sans-serif">
    <g transform="translate(46 155)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#boon-01-classic" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">01  CLASSIC</text></g>
    <g transform="translate(317 155)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#boon-02-soft" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">02  SOFT</text></g>
    <g transform="translate(588 155)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#boon-03-wide" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">03  WIDE</text></g>
    <g transform="translate(859 155)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#boon-04-sharp" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">04  SHARP</text></g>
    <g transform="translate(1130 155)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#boon-05-chunky" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">05  CHUNKY</text></g>
  </g>

  <text x="48" y="802" fill="#ffe8a3" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="20" font-weight="850" letter-spacing="2">TAKE A BREAK • PALE YELLOW MOON</text>
  <g color="#ffe8a3" font-family="Inter,ui-sans-serif,system-ui,sans-serif">
    <g transform="translate(46 825)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#break-01-classic" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">01  CLASSIC</text></g>
    <g transform="translate(317 825)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#break-02-slim" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">02  SLIM</text></g>
    <g transform="translate(588 825)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#break-03-full" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">03  FULL</text></g>
    <g transform="translate(859 825)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#break-04-upright" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">04  UPRIGHT</text></g>
    <g transform="translate(1130 825)"><rect width="224" height="224" rx="18" fill="#080a0e" stroke="#f7f7f2" stroke-width="5" filter="url(#tile-shadow)"/><use href="#break-05-tilted" x="38" y="38" width="148" height="148"/><text x="112" y="263" fill="#f7f7f2" font-size="17" font-weight="800" text-anchor="middle">05  TILTED</text></g>
  </g>
</svg>
