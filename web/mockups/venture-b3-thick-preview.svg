  </svg>
  <text x="400" y="692" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="24" font-weight="800" text-anchor="middle">THICKER CURVE • WIDER DOT GAP</text>
  <text x="400" y="732" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="18" text-anchor="middle">Heart pink on the production-style venture tile</text>
