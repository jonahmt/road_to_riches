  <defs>
    <filter id="tile-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#171b24"/>
  <text x="400" y="68" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="1.2">B3 REFINEMENT</text>
  <rect x="140" y="108" width="520" height="520" rx="42" fill="#080a0e" stroke="#f7f7f2" stroke-width="12" filter="url(#tile-shadow)"/>
  <svg x="190" y="150" width="420" height="420" viewBox="0 0 100 100" color="#ff6aae">
    <path fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round" stroke-linejoin="round" d="M25 30C25 18 35 11 50 11 65 11 75 19 75 31c0 12-9 17-18 22-7 4-10 9-10 15"/>
