<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <title>Road to Riches ROLL ON SVG candidates</title>
  <desc>Five clean corner-view dice for the ROLL ON board square, each shown in a production-style labeled tile.</desc>

  <defs>
    <symbol id="die-01-balanced" viewBox="0 0 160 140">
      <g stroke="#080a0e" stroke-width="4.5" stroke-linejoin="round">
        <path fill="#f7f7f2" d="M80 7 146 42 80 78 14 42Z"/>
        <path fill="#dfe2df" d="M14 42 80 78v56l-66-36Z"/>
        <path fill="#c9ceca" d="m80 78 66-36v56l-66 36Z"/>
      </g>
      <g fill="#080a0e">
        <circle cx="80" cy="38" r="7"/>
        <ellipse cx="35" cy="69" rx="6.5" ry="8.5" transform="rotate(-28 35 69)"/>
        <ellipse cx="59" cy="105" rx="6.5" ry="8.5" transform="rotate(-28 59 105)"/>
        <ellipse cx="124" cy="69" rx="6.5" ry="8.5" transform="rotate(28 124 69)"/>
        <ellipse cx="99" cy="102" rx="6.5" ry="8.5" transform="rotate(28 99 102)"/>
        <ellipse cx="128" cy="113" rx="6.5" ry="8.5" transform="rotate(28 128 113)"/>
      </g>
    </symbol>

    <symbol id="die-02-soft" viewBox="0 0 160 140">
      <g stroke="#080a0e" stroke-width="4.5" stroke-linejoin="round">
        <path fill="#f7f7f2" d="M80 8q4 0 9 3l51 28q8 4 0 9L86 78q-6 4-12 0L20 48q-8-5 0-9l51-28q5-3 9-3Z"/>
        <path fill="#e2e5e2" d="m20 48 54 30q6 4 6 11v39q0 9-8 5l-51-27q-7-4-7-12V55q0-10 6-7Z"/>
        <path fill="#cbd0cd" d="m140 48-54 30q-6 4-6 11v39q0 9 8 5l51-27q7-4 7-12V55q0-10-6-7Z"/>
      </g>
      <g fill="#080a0e">
        <ellipse cx="58" cy="35" rx="7.5" ry="6" transform="rotate(28 58 35)"/>
        <ellipse cx="103" cy="49" rx="7.5" ry="6" transform="rotate(28 103 49)"/>
        <ellipse cx="37" cy="72" rx="6.5" ry="8.5" transform="rotate(-28 37 72)"/>
        <ellipse cx="57" cy="111" rx="6.5" ry="8.5" transform="rotate(-28 57 111)"/>
        <ellipse cx="121" cy="75" rx="6.5" ry="8.5" transform="rotate(28 121 75)"/>
        <ellipse cx="104" cy="112" rx="6.5" ry="8.5" transform="rotate(28 104 112)"/>
      </g>
    </symbol>

    <symbol id="die-03-tall" viewBox="0 0 160 140">
      <g stroke="#080a0e" stroke-width="4.5" stroke-linejoin="round">
        <path fill="#f7f7f2" d="M80 6 142 35 80 67 18 35Z"/>
        <path fill="#dde1de" d="m18 35 62 32v67L18 102Z"/>
        <path fill="#c8cdca" d="m80 67 62-32v67l-62 32Z"/>
      </g>
      <g fill="#080a0e">
        <ellipse cx="80" cy="35" rx="7" ry="6"/>
        <ellipse cx="38" cy="59" rx="6.2" ry="8.2" transform="rotate(-25 38 59)"/>
        <ellipse cx="59" cy="91" rx="6.2" ry="8.2" transform="rotate(-25 59 91)"/>
        <ellipse cx="37" cy="105" rx="6.2" ry="8.2" transform="rotate(-25 37 105)"/>
        <ellipse cx="119" cy="60" rx="6.2" ry="8.2" transform="rotate(25 119 60)"/>
        <ellipse cx="101" cy="87" rx="6.2" ry="8.2" transform="rotate(25 101 87)"/>
        <ellipse cx="121" cy="110" rx="6.2" ry="8.2" transform="rotate(25 121 110)"/>
      </g>
    </symbol>

    <symbol id="die-04-wide" viewBox="0 0 160 140">
      <g stroke="#080a0e" stroke-width="4.5" stroke-linejoin="round">
        <path fill="#f7f7f2" d="M80 13 150 45 80 77 10 45Z"/>
        <path fill="#dfe3df" d="m10 45 70 32v50l-70-32Z"/>
        <path fill="#c8cdca" d="m80 77 70-32v50l-70 32Z"/>
      </g>
      <g fill="#080a0e">
        <ellipse cx="51" cy="39" rx="7.5" ry="6" transform="rotate(22 51 39)"/>
        <ellipse cx="109" cy="51" rx="7.5" ry="6" transform="rotate(22 109 51)"/>
        <ellipse cx="31" cy="68" rx="6.5" ry="8" transform="rotate(-32 31 68)"/>
        <ellipse cx="59" cy="101" rx="6.5" ry="8" transform="rotate(-32 59 101)"/>
        <ellipse cx="128" cy="68" rx="6.5" ry="8" transform="rotate(32 128 68)"/>
        <ellipse cx="101" cy="101" rx="6.5" ry="8" transform="rotate(32 101 101)"/>
      </g>
    </symbol>

    <symbol id="die-05-tilted" viewBox="0 0 160 140">
      <g transform="rotate(-5 80 72)" stroke="#080a0e" stroke-width="4.5" stroke-linejoin="round">
        <path fill="#f7f7f2" d="M80 7 145 42 80 79 15 42Z"/>
        <path fill="#dce0dd" d="m15 42 65 37v55L15 98Z"/>
        <path fill="#c7ccc9" d="m80 79 65-37v56l-65 36Z"/>
        <g fill="#080a0e" stroke="none">
          <ellipse cx="55" cy="37" rx="7" ry="5.8" transform="rotate(28 55 37)"/>
          <ellipse cx="106" cy="48" rx="7" ry="5.8" transform="rotate(28 106 48)"/>
          <ellipse cx="35" cy="67" rx="6.5" ry="8.5" transform="rotate(-28 35 67)"/>
          <ellipse cx="58" cy="109" rx="6.5" ry="8.5" transform="rotate(-28 58 109)"/>
          <ellipse cx="122" cy="68" rx="6.5" ry="8.5" transform="rotate(28 122 68)"/>
          <ellipse cx="100" cy="104" rx="6.5" ry="8.5" transform="rotate(28 100 104)"/>
          <ellipse cx="128" cy="115" rx="6.5" ry="8.5" transform="rotate(28 128 115)"/>
        </g>
      </g>
    </symbol>

    <filter id="tile-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="#171b24"/>
  <text x="500" y="55" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="2" text-anchor="middle">ROLL ON • CORNER-VIEW DIE</text>
  <text x="500" y="83" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="650" letter-spacing="1.2" text-anchor="middle">FIVE CLEAN PRODUCTION-TILE DIRECTIONS</text>

  <g font-family="Inter,ui-sans-serif,system-ui,sans-serif">
    <g transform="translate(65 115)">
      <rect width="270" height="270" rx="24" fill="#080a0e" stroke="#f7f7f2" stroke-width="7" filter="url(#tile-shadow)"/>
      <text x="135" y="54" fill="#f7f7f2" font-size="26" font-weight="900" letter-spacing="1.6" text-anchor="middle">ROLL ON</text>
      <use href="#die-01-balanced" x="52" y="78" width="166" height="145"/>
      <text x="135" y="307" fill="#f7f7f2" font-size="17" font-weight="850" letter-spacing="1" text-anchor="middle">01  BALANCED</text>
    </g>

    <g transform="translate(365 115)">
      <rect width="270" height="270" rx="24" fill="#080a0e" stroke="#f7f7f2" stroke-width="7" filter="url(#tile-shadow)"/>
      <text x="135" y="54" fill="#f7f7f2" font-size="26" font-weight="900" letter-spacing="1.6" text-anchor="middle">ROLL ON</text>
      <use href="#die-02-soft" x="52" y="78" width="166" height="145"/>
      <text x="135" y="307" fill="#f7f7f2" font-size="17" font-weight="850" letter-spacing="1" text-anchor="middle">02  SOFT</text>
    </g>

    <g transform="translate(665 115)">
      <rect width="270" height="270" rx="24" fill="#080a0e" stroke="#f7f7f2" stroke-width="7" filter="url(#tile-shadow)"/>
      <text x="135" y="54" fill="#f7f7f2" font-size="26" font-weight="900" letter-spacing="1.6" text-anchor="middle">ROLL ON</text>
      <use href="#die-03-tall" x="52" y="78" width="166" height="145"/>
      <text x="135" y="307" fill="#f7f7f2" font-size="17" font-weight="850" letter-spacing="1" text-anchor="middle">03  TALL</text>
    </g>

    <g transform="translate(215 555)">
      <rect width="270" height="270" rx="24" fill="#080a0e" stroke="#f7f7f2" stroke-width="7" filter="url(#tile-shadow)"/>
      <text x="135" y="54" fill="#f7f7f2" font-size="26" font-weight="900" letter-spacing="1.6" text-anchor="middle">ROLL ON</text>
      <use href="#die-04-wide" x="52" y="78" width="166" height="145"/>
      <text x="135" y="307" fill="#f7f7f2" font-size="17" font-weight="850" letter-spacing="1" text-anchor="middle">04  WIDE</text>
    </g>

    <g transform="translate(515 555)">
      <rect width="270" height="270" rx="24" fill="#080a0e" stroke="#f7f7f2" stroke-width="7" filter="url(#tile-shadow)"/>
      <text x="135" y="54" fill="#f7f7f2" font-size="26" font-weight="900" letter-spacing="1.6" text-anchor="middle">ROLL ON</text>
      <use href="#die-05-tilted" x="52" y="78" width="166" height="145"/>
      <text x="135" y="307" fill="#f7f7f2" font-size="17" font-weight="850" letter-spacing="1" text-anchor="middle">05  TILTED</text>
    </g>
  </g>
</svg>
