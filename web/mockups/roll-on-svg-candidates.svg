<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1360" viewBox="0 0 1360 1360">
  <title>Road to Riches Roll On isometric die candidates</title>
  <desc>Ten labeled board-tile candidates using one mathematically projected isometric cube with one, two, and three pips on its three visible faces.</desc>

  <defs>
    <!--
      The six outer points form a true isometric cube silhouette. Each face is
      the affine projection of a unit square. Pip centers are defined in unit
      face coordinates, then transformed by the same face matrix; they are not
      manually positioned in screen space.

      top:   (u,v) -> (50,6)  + u(40,23) + v(-40,23)
      left:  (u,v) -> (10,29) + u(40,23) + v(0,46)
      right: (u,v) -> (50,52) + u(40,-23) + v(0,46)
    -->
    <symbol id="isometric-die-123" viewBox="0 0 100 104">
      <polygon points="50,6 90,29 50,52 10,29" fill="var(--die-top, #f5f5f2)"/>
      <polygon points="10,29 50,52 50,98 10,75" fill="var(--die-left, #c8ced0)"/>
      <polygon points="50,52 90,29 90,75 50,98" fill="var(--die-right, #aeb6b8)"/>

      <g fill="var(--die-pip, #080a0e)">
        <g transform="matrix(40 23 -40 23 50 6)">
          <circle cx=".5" cy=".5" r=".082"/>
        </g>
        <g transform="matrix(40 23 0 46 10 29)">
          <circle cx=".28" cy=".25" r=".075"/>
          <circle cx=".72" cy=".75" r=".075"/>
        </g>
        <g transform="matrix(40 -23 0 46 50 52)">
          <circle cx=".25" cy=".24" r=".075"/>
          <circle cx=".5" cy=".5" r=".075"/>
          <circle cx=".75" cy=".76" r=".075"/>
        </g>
      </g>

      <path d="M50 6 90 29v46L50 98 10 75V29L50 6Z M10 29l40 23 40-23M50 52v46"
        fill="none" stroke="var(--die-edge, #080a0e)" stroke-width="var(--die-edge-width, 3.2)"
        stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1360" height="1360" fill="#171b24"/>
  <text x="36" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="850" letter-spacing="1.2">ROLL ON • TRUE ISOMETRIC 1 / 2 / 3</text>
  <text x="1324" y="48" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" letter-spacing="1" text-anchor="end">TEN CLEAN COLOR DIRECTIONS</text>

  <g font-family="Inter,ui-sans-serif,system-ui,sans-serif">
    <g transform="translate(30 90)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#f7f7f2;--die-left:#d5d9da;--die-right:#b8bec0;--die-edge:#080a0e"/>
    </g>
    <g transform="translate(300 90)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#ffffff;--die-left:#e3e6e5;--die-right:#c7ccca;--die-edge:#22272a"/>
    </g>
    <g transform="translate(570 90)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#edf2ee;--die-left:#8fc58d;--die-right:#5b9e65;--die-edge:#101713"/>
    </g>
    <g transform="translate(840 90)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#f2c94c;--die-left:#d8ddd8;--die-right:#aeb8b2;--die-edge:#111513"/>
    </g>
    <g transform="translate(1110 90)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#f4f4ef;--die-left:#b9c0bd;--die-right:#6f7c76;--die-edge:#080a0e;--die-edge-width:4.5"/>
    </g>

    <g transform="translate(30 750)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#dfe5e1;--die-left:#96aa9d;--die-right:#6f8578;--die-edge:#dfe5e1;--die-pip:#080a0e"/>
    </g>
    <g transform="translate(300 750)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#fff4bd;--die-left:#dce6d9;--die-right:#a8c4a4;--die-edge:#27342b"/>
    </g>
    <g transform="translate(570 750)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#c8d7c7;--die-left:#4f8a5a;--die-right:#2f6540;--die-edge:#e9eee9;--die-pip:#f7f7f2;--die-edge-width:2.5"/>
    </g>
    <g transform="translate(840 750)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#f2c94c;--die-left:#65a96e;--die-right:#3c7a4b;--die-edge:#f7f7f2;--die-pip:#080a0e;--die-edge-width:2.4"/>
    </g>
    <g transform="translate(1110 750)">
      <rect width="220" height="220" rx="20" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="110" y="43" fill="#f7f7f2" font-size="23" font-weight="900" text-anchor="middle">ROLL ON</text>
      <use href="#isometric-die-123" x="48" y="68" width="124" height="129" style="--die-top:#f7f7f2;--die-left:#f2c94c;--die-right:#58a567;--die-edge:#080a0e;--die-pip:#080a0e;--die-edge-width:3.8"/>
    </g>
  </g>

  <g fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="800" text-anchor="middle">
    <text x="140" y="345">01  MONO</text><text x="410" y="345">02  SOFT GREY</text>
    <text x="680" y="345">03  GREEN SIDES</text><text x="950" y="345">04  GOLD TOP</text>
    <text x="1220" y="345">05  HEAVY EDGE</text>
    <text x="140" y="1005">06  PALE EDGE</text><text x="410" y="1005">07  SPRING</text>
    <text x="680" y="1005">08  DEEP GREEN</text><text x="950" y="1005">09  LIGHT EDGE</text>
    <text x="1220" y="1005">10  TRI-COLOR</text>
  </g>
  <text x="680" y="1160" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">ALL TEN USE THE SAME EQUAL-EDGE CUBE PROJECTION AND AFFINE-TRANSFORMED PIP COORDINATES</text>
</svg>
