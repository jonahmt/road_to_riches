<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <title>Road to Riches arcade SVG candidates</title>
  <desc>Five production-style arcade tiles, each with an ARCADE label and exactly three differently colored fireworks in visibly different sizes.</desc>

  <defs>
    <filter id="tile-shadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity=".3"/>
    </filter>

    <symbol id="firework-round" viewBox="-50 -50 100 100">
      <g fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round">
        <path d="M0-43V-25M0 25V43M-43 0H-25M25 0H43"/>
        <path d="m-30-30 13 13m34 34 13 13m-60 0 13-13m34-34 13-13"/>
      </g>
      <circle r="8" fill="currentColor"/>
    </symbol>

    <symbol id="firework-spark" viewBox="-50 -50 100 100">
      <g fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round">
        <path d="M0-45V-22M0 22V45M-45 0H-22M22 0H45"/>
        <path d="m-32-32 17 17m30 30 17 17m-64 0 17-17m30-30 17-17"/>
      </g>
      <circle r="7" fill="currentColor"/>
    </symbol>

    <symbol id="firework-dotted" viewBox="-50 -50 100 100">
      <g fill="currentColor">
        <circle r="8"/>
        <circle cx="0" cy="-40" r="5"/><circle cx="28" cy="-28" r="5"/>
        <circle cx="40" cy="0" r="5"/><circle cx="28" cy="28" r="5"/>
        <circle cx="0" cy="40" r="5"/><circle cx="-28" cy="28" r="5"/>
        <circle cx="-40" cy="0" r="5"/><circle cx="-28" cy="-28" r="5"/>
      </g>
      <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round">
        <path d="M0-24V-15M17-17l-7 7M24 0h-9M17 17l-7-7M0 24v-9M-17 17l7-7M-24 0h9M-17-17l7 7"/>
      </g>
    </symbol>

    <symbol id="firework-angular" viewBox="-50 -50 100 100">
      <g fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M0-45v20M0 25v20M-45 0h20M25 0h20"/>
        <path d="m-32-32 14 14m36 36 14 14m-64 0 14-14m36-36 14-14"/>
      </g>
      <path fill="currentColor" d="m0-10 4 6 8 4-8 4-4 8-4-8-8-4 8-4Z"/>
    </symbol>

    <symbol id="firework-solid" viewBox="-50 -50 100 100">
      <path fill="currentColor" d="M0-48 9-19 32-34 21-9 49-5 22 7 41 29 13 18 8 47-3 20-27 38-17 11-47 10-20-3-40-25-11-17Z"/>
      <circle r="7" fill="#080a0e"/>
    </symbol>

    <symbol id="arcade-01-classic" viewBox="0 0 260 260">
      <rect x="3" y="3" width="254" height="254" rx="22" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="130" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="1.8" text-anchor="middle">ARCADE</text>
      <use href="#firework-round" x="69" y="82" width="122" height="122" color="#ff5aa5"/>
      <use href="#firework-round" x="34" y="141" width="82" height="82" color="#58c8ff"/>
      <use href="#firework-round" x="172" y="151" width="58" height="58" color="#ffb703"/>
    </symbol>

    <symbol id="arcade-02-skyline" viewBox="0 0 260 260">
      <rect x="3" y="3" width="254" height="254" rx="22" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="130" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="1.8" text-anchor="middle">ARCADE</text>
      <use href="#firework-spark" x="20" y="120" width="86" height="86" color="#ffb703"/>
      <use href="#firework-spark" x="70" y="69" width="130" height="130" color="#ff5aa5"/>
      <use href="#firework-spark" x="176" y="135" width="62" height="62" color="#58c8ff"/>
    </symbol>

    <symbol id="arcade-03-confetti" viewBox="0 0 260 260">
      <rect x="3" y="3" width="254" height="254" rx="22" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="130" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="1.8" text-anchor="middle">ARCADE</text>
      <use href="#firework-dotted" x="17" y="82" width="112" height="112" color="#58c8ff"/>
      <use href="#firework-dotted" x="116" y="122" width="102" height="102" color="#ff5aa5"/>
      <use href="#firework-dotted" x="170" y="76" width="64" height="64" color="#ffb703"/>
    </symbol>

    <symbol id="arcade-04-diagonal" viewBox="0 0 260 260">
      <rect x="3" y="3" width="254" height="254" rx="22" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="130" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="1.8" text-anchor="middle">ARCADE</text>
      <use href="#firework-angular" x="26" y="139" width="70" height="70" color="#ff5aa5"/>
      <use href="#firework-angular" x="69" y="89" width="98" height="98" color="#ffb703"/>
      <use href="#firework-angular" x="126" y="66" width="126" height="126" color="#58c8ff"/>
    </symbol>

    <symbol id="arcade-05-bold" viewBox="0 0 260 260">
      <rect x="3" y="3" width="254" height="254" rx="22" fill="#080a0e" stroke="#f7f7f2" stroke-width="6"/>
      <text x="130" y="49" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="29" font-weight="850" letter-spacing="1.8" text-anchor="middle">ARCADE</text>
      <use href="#firework-solid" x="63" y="75" width="130" height="130" color="#ff5aa5"/>
      <use href="#firework-solid" x="21" y="145" width="78" height="78" color="#ffb703"/>
      <use href="#firework-solid" x="177" y="146" width="56" height="56" color="#58c8ff"/>
    </symbol>
  </defs>

  <rect width="1000" height="1000" fill="#171b24"/>
  <text x="40" y="55" fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="30" font-weight="850" letter-spacing="1.4">ARCADE • THREE FIREWORKS</text>
  <text x="960" y="53" fill="#9da5b4" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" letter-spacing="1" text-anchor="end">FIVE TILE DIRECTIONS</text>

  <g filter="url(#tile-shadow)">
    <use href="#arcade-01-classic" x="50" y="105" width="260" height="260"/>
    <use href="#arcade-02-skyline" x="370" y="105" width="260" height="260"/>
    <use href="#arcade-03-confetti" x="690" y="105" width="260" height="260"/>
    <use href="#arcade-04-diagonal" x="210" y="545" width="260" height="260"/>
    <use href="#arcade-05-bold" x="530" y="545" width="260" height="260"/>
  </g>

  <g fill="#f7f7f2" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="800" letter-spacing=".7" text-anchor="middle">
    <text x="180" y="402">01  CLASSIC</text>
    <text x="500" y="402">02  SKYLINE</text>
    <text x="820" y="402">03  CONFETTI</text>
    <text x="340" y="842">04  DIAGONAL</text>
    <text x="660" y="842">05  BOLD</text>
  </g>

  <g font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" letter-spacing=".6" text-anchor="middle">
    <text x="180" y="430" fill="#9da5b4">ROUND • CENTERED</text>
    <text x="500" y="430" fill="#9da5b4">WIDE • CELEBRATORY</text>
    <text x="820" y="430" fill="#9da5b4">DOTTED • PLAYFUL</text>
    <text x="340" y="870" fill="#9da5b4">ANGULAR • ASCENDING</text>
    <text x="660" y="870" fill="#9da5b4">SOLID • GRAPHIC</text>
  </g>

  <g transform="translate(294 930)" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="800" letter-spacing=".9">
    <circle cx="0" cy="-5" r="7" fill="#ff5aa5"/><text x="15" y="0" fill="#c8ced8">PINK</text>
    <circle cx="136" cy="-5" r="7" fill="#58c8ff"/><text x="151" y="0" fill="#c8ced8">SKY BLUE</text>
    <circle cx="312" cy="-5" r="7" fill="#ffb703"/><text x="327" y="0" fill="#c8ced8">AMBER</text>
  </g>
</svg>
